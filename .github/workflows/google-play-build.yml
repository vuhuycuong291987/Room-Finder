name: Expo Cloud Build
on:
  push:
    branches:
      - main  # Chạy tự động mỗi khi bạn "Push" code lên nhánh main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Lay ma nguon
        uses: actions/checkout@v4

      - name: 📦 Cai dat pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8 # Hoac phien ban ban dang dung tren Replit

      - name: 🏗 Cai dat Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm' # Quan trong: Bat tinh nang cache cho pnpm

      - name: 📦 Cai dat Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🚀 Gui lenh Build den Expo Cloud
        run: eas build --platform android --profile preview --non-interactive
